<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 820px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #1a1a1a; }
    img { max-width: 100%; height: auto; border-radius: 6px; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 6px; overflow-x: auto; }
    code { font-size: 0.9em; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; }
    a { color: #0969da; }
    blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 16px; color: #555; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
